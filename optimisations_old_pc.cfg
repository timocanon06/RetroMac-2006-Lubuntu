# ========================================================
# RETROARCH OPTIMIZATION CONFIG FOR VINTAGE PCS (2006)
# ========================================================
# Reference guide for settings to change in: ~/.config/retroarch/retroarch.cfg

# --- VIDEO BOOST ---
# Disables V-Sync to prevent the GPU from choking
video_vsync = "false"

# Allows the dual-core CPU to split tasks (Huge FPS boost)
video_threaded = "true"

# Disables blurring, giving sharp pixel-art graphics
video_smooth = "false"

# --- AUDIO STUTTER FIX ---
# Increases the audio buffer to prevent crackling (160 to 256 recommended)
audio_latency = "160"

# --- ON-SCREEN DISPLAY ---
# Crucial for testing the physical limits of the machine
fps_show = "true"

# --- HOTKEY SAFETY ---
# Clears the slow-motion hotkey to prevent accidental activation
input_slowmotion_btn = "nul"
input_slowmotion_axis = "nul"

# ========================================================
# DESMUME (NINTENDO DS) CORE OPTIONS
# Access via Quick Menu (F1) -> Options while game is running
# ========================================================
# Frameskip: Set to 1 or 2 (Mandatory)
# CPU Mode: JIT (Crucial for speed)
# Enable Advanced Bus-Level Timing: OFF
# Audio Interpolation: None
# Internal Resolution: 256x192 (1x Native)
